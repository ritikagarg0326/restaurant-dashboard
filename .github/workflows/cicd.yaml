name: Restaurant CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: restaurant-backend
  FRONTEND_IMAGE: restaurant-frontend

jobs:

  # ─────────────────────────────
  # JOB 1 — LINT
  # ─────────────────────────────
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Backend
        run: |
          cd backend
          pip install flake8 --quiet
          flake8 . --max-line-length=120 || true

      - name: Lint Frontend
        run: |
          cd frontend
          npm install
          npm run lint || true

  # ─────────────────────────────
  # JOB 2 — TEST
  # ─────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Test Backend
        run: |
          cd backend
          pip install -r requirements.txt --quiet
          pip install pytest --quiet
          pytest || true

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

  # ─────────────────────────────
  # JOB 3 — BUILD & PUSH DOCKER
  # ─────────────────────────────
  docker:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.SHA }}
            ${{ env.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.SHA }}
            ${{ env.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest

  # ─────────────────────────────
  # JOB 4 — UPDATE HELM CHART
  # ─────────────────────────────
  update-helm-chart:
    name: 📦 Update Helm Chart Tag
    runs-on: ubuntu-latest
    needs: docker

    # ✅ FIXED CONDITION (NO YAML ERROR + NO LOOP)
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, 'ci: update image tags') }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Set Short SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update Helm values.yaml
        run: |
          sed -i "/backend:/,/tag:/ s/tag: .*/tag: \"${{ steps.vars.outputs.SHA }}\"/" restaurant-chart/values.yaml
          sed -i "/frontend:/,/tag:/ s/tag: .*/tag: \"${{ steps.vars.outputs.SHA }}\"/" restaurant-chart/values.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.email "ritikagarg60814@gmail.com"
          git config --global user.name "GitHub Actions"

          git add restaurant-chart/values.yaml

          # ✅ Commit only if changes exist
          git diff --quiet && echo "No changes to commit" || git commit -m "ci: update image tags to ${{ steps.vars.outputs.SHA }} [skip ci]"

          git push https://${{ secrets.TOKEN }}@github.com/ritikagarg0326/restaurant-dashboard.git
